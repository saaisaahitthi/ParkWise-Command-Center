[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING
markers =
    integration: marks tests as integration (require TEST_DATABASE_URL)
    unit: marks tests as pure unit tests (no external deps)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
